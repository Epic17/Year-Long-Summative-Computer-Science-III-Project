<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Efficient Airways (EA) Flight Dispatch</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Efficient Airways (EA) Flight Dispatch</h1>
    <div class="container">
        <section class="flights-section">
            <h2>Flights</h2>
            <table id="flights-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Origin</th>
                        <th>Destination</th>
                        <th>Status</th>
                        <th>Aircraft Type</th>
                    </tr>
                </thead>
                <tbody id="flights-tbody">
                </tbody>
            </table>
        </section>
        <section class="details-section">
            <h2>Flight Details</h2>
            <div id="flight-details">Select a flight to view details.</div>
        </section>
        <section class="add-flight-section">
            <h2>Add New Flight with Plan</h2>
            <form id="add-flight-form">
                <label>Origin: <input type="text" name="origin"></label>
                <label>Destination: <input type="text" name="destination"></label>
                <label>Aircraft Type: <select name="aircraft_type">
                    <option value="Boeing 737-800">Boeing 737-800</option>
                    <option value="Boeing 737 MAX-8">Boeing 737 MAX-8</option>
                    <option value="Boeing 737 MAX-9">Boeing 737 MAX-9</option>
                    <option value="Airbus A319">Airbus A319</option>
                    <option value="Airbus A319neo">Airbus A319neo</option>
                    <option value="Airbus A320">Airbus A320</option>
                    <option value="Airbus A320neo">Airbus A320neo</option>
                    <option value="Airbus A321">Airbus A321</option>
                    <option value="Airbus A321neo">Airbus A321neo</option>
                    <option value="Airbus A321XLR">Airbus A321XLR</option>
                    <option value="Airbus A330">Airbus A330</option>
                    <option value="Boeing 757">Boeing 757</option>
                    <option value="Boeing 767">Boeing 767</option>
                    <option value="Boeing 777">Boeing 777</option>
                    <option value="Boeing 787">Boeing 787</option>
                    <option value="Airbus A350">Airbus A350</option>
                </select></label>
                <button type="submit">Add Flight and Generate Plan</button>
            </form>
            <div id="plan-result"></div>
        </section>
        <section class="plans-section">
            <h2>Generated Flight Plans</h2>
            <table id="plans-table">
                <thead>
                    <tr>
                        <th>Origin</th>
                        <th>Destination</th>
                        <th>Route</th>
                        <th>Aircraft Type</th>
                    </tr>
                </thead>
                <tbody id="plans-tbody">
                </tbody>
            </table>
        </section>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
